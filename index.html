---
layout: default
title: 글
---

<section class="intro">
  <p class="eyebrow">WRITING ARCHIVE</p>

  <h1>
    pyeonghwa2703,<br>
    개인 기록장
  </h1>

  <p>
    내 개인적 감정과,
    가치관을 담은 이야기를 씁니다.
  </p>
</section>

<section class="post-section">
  <div class="section-title">
    <h2>최근 글</h2>
    <span>{{ site.posts.size }}개의 글</span>
  </div>

  <div class="post-list">
    {% for post in site.posts %}
      <article class="post-card">
        <a href="{{ post.url | relative_url }}">
          <p class="post-category">
            {{ post.category }}
          </p>

          <h3>{{ post.title }}</h3>

          <p class="post-description">
            {{ post.description }}
          </p>

          <time>
            {{ post.date | date: "%Y.%m.%d" }}
          </time>
        </a>
      </article>
    {% endfor %}
  </div>
</section>

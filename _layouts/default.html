<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description"
        content="{{ page.description | default: site.description }}">

  <link rel="stylesheet"
        href="{{ '/assets/style.css' | relative_url }}">
</head>

<body>
  <header class="site-header">
    <a class="logo" href="{{ '/' | relative_url }}">
      tagmeplz
    </a>

    <nav>
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/about/' | relative_url }}">소개</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} byunminol</p>
  </footer>
</body>
</html>
